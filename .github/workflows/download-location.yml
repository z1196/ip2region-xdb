name: "获取行政区划表"

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download location.json
        run: |
          curl -L \
            https://raw.githubusercontent.com/darlene-he/location/main/data/location.json \
            -o location.json

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add location.json
          git commit -m "Update location.json" || echo "No changes to commit"
          git push
